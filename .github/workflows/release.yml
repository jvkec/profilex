name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B .build

      - name: Build
        run: cmake --build .build

      - name: Test
        run: ctest --test-dir .build --output-on-failure

      - name: Package
        run: cmake --build .build --target package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profilex-${{ runner.os }}
          path: |
            .build/*.tar.gz
            .build/*.tgz
