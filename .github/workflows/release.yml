name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: >
          Tag for the GitHub Release when running manually (e.g. v0.1.0).
          Tag pushes ignore this; the workflow ref is used instead.
        required: true
        type: string
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B .build

      - name: Build
        run: cmake --build .build

      - name: Test
        run: ctest --test-dir .build --output-on-failure

      - name: Package
        run: cmake --build .build --target package

      - name: List packaged files
        run: ls -la .build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profilex-${{ runner.os }}
          path: .build/*.tar.gz
          if-no-files-found: error

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    if: success() && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: profilex-*
          path: release-artifacts
          merge-multiple: true

      - name: Collect packaged files
        run: |
          mkdir -p dist
          find release-artifacts -maxdepth 1 -type f -name "*.tar.gz" -exec cp {} dist/ \;
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          files: dist/*
          draft: false
          generate_release_notes: false
          body_path: .github/release-template.md
